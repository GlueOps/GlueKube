name: Molecule Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Molecule scenario to run (leave empty for all)'
        required: false
        type: choice
        options:
          - 'all'
          - 'test-cluster'
          - 'test-cluster-aws'
          - 'rotate-master-nodes'
          - 'scale-cluster'
        default: 'all'

env:
  ANSIBLE_ROLES_PATH: ${{ github.workspace }}/ansible/roles

jobs:
  molecule:
    name: Molecule Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install molecule molecule-plugins[docker] ansible-core ansible-lint yamllint
          pip install docker
          pip install jmespath python-dateutil
          pip install boto3 botocore

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install community.docker hetzner.hcloud kubernetes.core
          ansible-galaxy collection install ansible.posix community.general
          ansible-galaxy collection install amazon.aws

      - name: Set up environment variables
        env:
          KUBERNETES_VERSION: 'v1.34.5'
          KUBERNETES_PACKAGE_VERSION: '1.34.5-1.1'
          domain_name: 'gluekube.qa-glueops.com'
          LOADBALANCER_APISERVER: 'ctrp.gluekube.qa-glueops.com'
          CALICO_CHART_VERSION: 'v3.31.4'
          CALICO_TIGERA_OPERATOR_VERSION: 'v1.40.7'
          CERTIFICATE_KEY: ${{ secrets.CERTIFICATE_KEY || '' }}
          RANDOM_TOKEN: ${{ secrets.RANDOM_TOKEN || '' }}
          AUTOGLUE_BASE_URL: https://autoglue.glueopshosted.rocks
          AUTOGLUE_ORG_KEY: ${{ secrets.AUTOGLUE_ORG_KEY || '' }}
          AUTOGLUE_ORG_SECRET: ${{ secrets.AUTOGLUE_ORG_SECRET || '' }}
          AUTOGLUE_ORG_ID: ${{ secrets.AUTOGLUE_ORG_ID || '' }}
          AUTOGLUE_RECORD_ID: ${{ secrets.AUTOGLUE_RECORD_ID || '' }}
          AUTOGLUE_CLUSTER_ID: 'empty'
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN || '' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || '' }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN || '' }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
          AWS_AVAILABILITY_ZONE: ${{ vars.AWS_AVAILABILITY_ZONE || '' }}
          AWS_INSTANCE_TYPE: ${{ vars.AWS_INSTANCE_TYPE || 't3.large' }}
        run: |
          echo "kubernetes_version=${KUBERNETES_VERSION}" >> $GITHUB_ENV
          echo "kubernetes_package_version=${KUBERNETES_PACKAGE_VERSION}" >> $GITHUB_ENV
          echo "loadbalancer_apiserver=${LOADBALANCER_APISERVER}" >> $GITHUB_ENV
          echo "calico_chart_version=${CALICO_CHART_VERSION}" >> $GITHUB_ENV
          echo "calico_tigera_operator_version=${CALICO_TIGERA_OPERATOR_VERSION}" >> $GITHUB_ENV
          echo "CERTIFICATE_KEY=${CERTIFICATE_KEY}" >> $GITHUB_ENV
          echo "RANDOM_TOKEN=${RANDOM_TOKEN}" >> $GITHUB_ENV
          echo "AUTOGLUE_BASE_URL=${AUTOGLUE_BASE_URL}" >> $GITHUB_ENV
          echo "AUTOGLUE_ORG_KEY=${AUTOGLUE_ORG_KEY}" >> $GITHUB_ENV
          echo "AUTOGLUE_ORG_SECRET=${AUTOGLUE_ORG_SECRET}" >> $GITHUB_ENV
          echo "AUTOGLUE_ORG_ID=${AUTOGLUE_ORG_ID}" >> $GITHUB_ENV
          echo "AUTOGLUE_RECORD_ID=${AUTOGLUE_RECORD_ID}" >> $GITHUB_ENV
          echo "AUTOGLUE_CLUSTER_ID=${AUTOGLUE_CLUSTER_ID}" >> $GITHUB_ENV
          echo "HCLOUD_TOKEN=${HCLOUD_TOKEN}" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}" >> $GITHUB_ENV

          echo "AWS_REGION=${AWS_REGION}" >> $GITHUB_ENV
          echo "AWS_AVAILABILITY_ZONE=${AWS_AVAILABILITY_ZONE}" >> $GITHUB_ENV
          echo "AWS_INSTANCE_TYPE=${AWS_INSTANCE_TYPE}" >> $GITHUB_ENV

      - name: Create /opt/gluekube directory and download Kubernetes release key
        run: |
          sudo mkdir -p /opt/gluekube
          K8S_MINOR=$(echo $kubernetes_version | cut -d. -f1,2)
          sudo curl -fsSL "https://pkgs.k8s.io/core:/stable:/${K8S_MINOR}/deb/Release.key" -o /opt/gluekube/kubernetes-release.key

      

      - name: Run Molecule Test - scale-cluster
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'scale-cluster'
        working-directory: ansible
        run: |
          mkdir -p molecule/scale-cluster/keys/
          ssh-keygen -t rsa -b 4096 -f molecule/scale-cluster/keys/vm_node -N "" -C "molecule-test-key"
          chmod 600 molecule/scale-cluster/keys/vm_node
          molecule test -s scale-cluster
      
      - name: Run Molecule Test - rotate-master-nodes
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'rotate-master-nodes'
        working-directory: ansible
        run: |
          mkdir -p molecule/rotate-master-nodes/keys/
          ssh-keygen -t rsa -b 4096 -f molecule/rotate-master-nodes/keys/vm_node -N "" -C "molecule-test-key"
          chmod 600 molecule/rotate-master-nodes/keys/vm_node
          molecule test -s rotate-master-nodes
      
      - name: Run Molecule Test - test-cluster
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'test-cluster'
        working-directory: ansible
        run: |
          mkdir -p molecule/test-cluster/keys/
          ssh-keygen -t rsa -b 4096 -f molecule/test-cluster/keys/vm_node -N "" -C "molecule-test-key"
          chmod 600 molecule/test-cluster/keys/vm_node
          molecule test -s test-cluster

      - name: Run Molecule Test - test-cluster-aws
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'test-cluster-aws'
        working-directory: ansible
        run: |
          mkdir -p molecule/test-cluster-aws/keys/
          ssh-keygen -t rsa -b 4096 -f molecule/test-cluster-aws/keys/vm_node -N "" -C "molecule-test-key"
          chmod 600 molecule/test-cluster-aws/keys/vm_node
          molecule test -s test-cluster-aws

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: molecule-test-results
          path: |
            ansible/molecule/**/.molecule
            ansible/molecule/**/tests
          retention-days: 7
