- name: Create calico.yaml file (default)
  ansible.builtin.template:
    src: calico.yaml.j2
    dest: /opt/kubernetes/calico.yaml
    mode: "0644"
  tags: install_calico

- name: Create calico.yaml file (with nodeAddressAutodetectionV4)
  ansible.builtin.template:
    src: calico-without-firstFound.yaml.j2
    dest: /opt/kubernetes/calico.yaml
    mode: "0644"
  when: calico_node_address_autodetection_v4 is defined and calico_node_address_autodetection_v4 | length > 0
  tags: install_calico


- name: Create calico global-network-policy.yaml file
  ansible.builtin.template:
    src: calico-global-network-policy.yaml.j2
    dest: /opt/kubernetes/calico-global-network-policy.yaml
    mode: "0644"
  tags: install_calico

- name: Copy calico felix config
  ansible.builtin.copy:
    src: "addons/felix.yaml"
    dest: /opt/kubernetes/calico-felix.yaml
    mode: "0755"
  tags: install_calico

- name: Copy calico global-network-policy config
  ansible.builtin.copy:
    src: "addons/calico-hostendpoint.yaml"
    dest: /opt/kubernetes/calico-hostendpoint.yaml
    mode: "0755"
  tags: install_calico

- name: Deploy calico with Helm
  kubernetes.core.helm:
    name: calico
    chart_ref: tigera-operator
    chart_version: "{{ calico_chart_version }}"
    chart_repo_url: https://docs.tigera.io/calico/charts
    release_namespace: tigera-operator
    create_namespace: true
    values_files:
      - /opt/kubernetes/calico.yaml
    kubeconfig: /etc/kubernetes/admin.conf
  tags: install_calico


- name: Wait for tigera-operator pod to be ready
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl -n tigera-operator wait --for=condition=Ready pods --all --timeout=30s
  register: tigera_operator_ready
  until: tigera_operator_ready.rc == 0
  retries: 20
  delay: 30
  tags: install_calico

- name: Wait for all Calico CRDs to be ready
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl wait --for=condition=Established crds --all --timeout=30s
  register: calico_crds_ready
  until: calico_crds_ready.rc == 0
  retries: 20
  delay: 30
  tags: install_calico


- name: Apply Calico Configs(Felix and Global Network Policy)
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf 
    kubectl apply -f /opt/kubernetes/calico-global-network-policy.yaml
    kubectl apply -f /opt/kubernetes/calico-felix.yaml
  register: apply_calico_configs
  until: apply_calico_configs.rc == 0
  retries: 30
  delay: 10
  tags: install_calico


- name: Apply Calico HostEndpoint manifest for each node
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    iface=$(ip -o link show | awk -F': ' '/altname public/ {print $2}')
    sed "s/node_name/{{ item }}/g; s/public/$iface/g" /opt/kubernetes/calico-hostendpoint.yaml | kubectl apply -f -
  vars:
    calico_hostendpoint_nodes: "{{ groups.keys() | select('match', '.*loadbalancer.*') | map('extract', groups) | flatten | unique }}"
  loop: "{{ calico_hostendpoint_nodes }}"
  tags: install_calico


