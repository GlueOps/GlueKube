- name: Create calico.yaml file
  ansible.builtin.template:
    src: calico.yaml.j2
    dest: /opt/kubernetes/calico.yaml
    mode: "0644"
  tags: install_calico


- name: Create calico global-network-policy.yaml file
  ansible.builtin.template:
    src: calico-global-network-policy.yaml.j2
    dest: /opt/kubernetes/calico-global-network-policy.yaml
    mode: "0644"
  tags: install_calico

- name: Copy calico felix config
  ansible.builtin.copy:
    src: "addons/felix.yaml"
    dest: /opt/kubernetes/calico-felix.yaml
    mode: "0755"
  tags: install_calico

- name: Copy calico global-network-policy config
  ansible.builtin.copy:
    src: "addons/calico-hostendpoint.yaml"
    dest: /opt/kubernetes/calico-hostendpoint.yaml
    mode: "0755"
  tags: install_calico

- name: Deploy calico with Helm
  kubernetes.core.helm:
    name: calico
    chart_ref: tigera-operator
    chart_version: "{{ calico_chart_version }}"
    chart_repo_url: https://docs.tigera.io/calico/charts
    release_namespace: tigera-operator
    create_namespace: true
    values_files:
      - /opt/kubernetes/calico.yaml
    kubeconfig: /etc/kubernetes/admin.conf
  tags: install_calico


- name: Wait for Calico operator deployment to be ready
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl wait --for=condition=Available --timeout=300s deployment/tigera-operator -n tigera-operator
  tags: install_calico


- name: Wait for Calico CRDs to exist
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl get crd globalnetworkpolicies.crd.projectcalico.org
  register: crd_check
  until: crd_check.rc == 0
  retries: 60
  delay: 5
  tags: install_calico


- name: Wait for Calico CRDs to be established
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl wait --for=condition=established --timeout=300s crd/globalnetworkpolicies.crd.projectcalico.org
    kubectl wait --for=condition=established --timeout=300s crd/felixconfigurations.crd.projectcalico.org
    kubectl wait --for=condition=established --timeout=300s crd/hostendpoints.crd.projectcalico.org
  tags: install_calico


- name: Wait for Calico API server to be ready
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl wait --for=condition=Available --timeout=300s deployment/calico-apiserver -n calico-apiserver 2>/dev/null || true
  tags: install_calico


- name: Apply Calico Configs(Felix and Global Network Policy)
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf 
    kubectl apply -f /opt/kubernetes/calico-global-network-policy.yaml
    kubectl apply -f /opt/kubernetes/calico-felix.yaml
  tags: install_calico


- name: Apply Calico HostEndpoint manifest for each node
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    iface=$(ip -o link show | awk -F': ' '/altname public/ {print $2}')
    sed "s/node_name/{{ item }}/g; s/public/$iface/g" /opt/kubernetes/calico-hostendpoint.yaml | kubectl apply -f -
  vars:
    calico_hostendpoint_nodes: "{{ (groups.get('masters', []) + groups.get('workers', [])) | unique }}"
  loop: "{{ calico_hostendpoint_nodes }}"
  tags: install_calico


