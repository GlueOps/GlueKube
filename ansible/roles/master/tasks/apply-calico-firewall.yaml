
# Wait for Calico API server and pods to be available
- name: Wait for Calico API Server pods to be ready
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl wait --for=condition=Ready pods -l k8s-app=calico-apiserver -n calico-system --timeout=300s
  register: calico_apiserver_wait
  retries: 10
  delay: 30
  until: calico_apiserver_wait.rc == 0
  tags: install_calico

- name: Wait for Calico v3 API Service to be available
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl get apiservice v3.projectcalico.org -o jsonpath='{.status.conditions[?(@.type=="Available")].status}'
  register: calico_api_status
  until: calico_api_status.stdout == "True"
  retries: 30
  delay: 15
  tags: install_calico
  changed_when: false

- name: Create calico global-network-policy.yaml file
  ansible.builtin.template:
    src: calico-global-network-policy.yaml.j2
    dest: /opt/kubernetes/calico-global-network-policy.yaml
    mode: "0644"
  tags: install_calico

- name: Apply Calico Configs(Felix and Global Network Policy)
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf 
    kubectl apply -f /opt/kubernetes/calico-global-network-policy.yaml
  tags: install_calico


- name: Get nodes with use-as-loadbalancer label
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl get nodes -l use-as-loadbalancer --no-headers -o custom-columns=':metadata.name'
  register: loadbalancer_nodes
  tags: install_calico

- name: Read persisted public interface from each loadbalancer node
  ansible.builtin.shell: cat /etc/glueops/public-interface
  delegate_to: "{{ item }}"
  become: false
  loop: "{{ loadbalancer_nodes.stdout_lines | default([]) }}"
  register: loadbalancer_public_interfaces
  changed_when: false
  failed_when: false
  tags: install_calico

- name: Build loadbalancer node to interface mapping
  ansible.builtin.set_fact:
    loadbalancer_interface_map: "{{ loadbalancer_interface_map | default({}) | combine({ item.item: (item.stdout | trim) }) }}"
  loop: "{{ loadbalancer_public_interfaces.results | default([]) | selectattr('rc', 'equalto', 0) | rejectattr('stdout', 'equalto', '') | list }}"
  tags: install_calico

- name: Create Calico HostEndpoint manifest for each loadbalancer node
  ansible.builtin.template:
    src: calico-hostendpoint.yaml.j2
    dest: "/opt/kubernetes/calico-hostendpoint-{{ item.key }}.yaml"
    mode: "0644"
  vars:
    hostendpoint_node_name: "{{ item.key }}"
    hostendpoint_interface_name: "{{ item.value }}"
  loop: "{{ loadbalancer_interface_map | default({}) | dict2items }}"
  tags: install_calico

- name: Apply Calico HostEndpoint manifest for each loadbalancer node
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl apply -f /opt/kubernetes/calico-hostendpoint-{{ item.key }}.yaml
  loop: "{{ loadbalancer_interface_map | default({}) | dict2items }}"
  tags: install_calico