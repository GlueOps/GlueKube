- name: Generate Kubeadm Join configuration
  ansible.builtin.template:
    src: kubeadm-join-config.j2
    dest: /opt/kubeadm_join.yaml
    mode: "0755"
  tags: create_join_command


- name: Create PKI directory
  ansible.builtin.file:
    path: /etc/kubernetes/pki/
    state: directory
    mode: '0755'
  tags: join_nodes

- name: Generate Authentication Configuration
  ansible.builtin.template:
    src: "authentication-configuration.yaml.j2"
    dest: "/etc/kubernetes/pki/authentication-config.yaml"
    owner: root
    group: root
    mode: "0644"
  tags: join_nodes


- name: Join the control-node to the Kubernetes cluster
  ansible.builtin.command: kubeadm join --config /opt/kubeadm_join.yaml
  args:
    creates: /opt/kubernetes/join_command.sh
  tags: join_nodes

- name: Generate Kubeadm configuration
  ansible.builtin.template:
    src: "kubeadm-stacked-config.yaml.j2"
    dest: "{{ kubeadm_config_file }}"
    owner: root
    group: root
    mode: "0644"
  tags: kubeconfig_setup
