- name: Generate Kubeadm configuration
  ansible.builtin.template:
    src: "kubeadm-stacked-config.yaml.j2"
    dest: "{{ kubeadm_config_file }}"
    owner: root
    group: root
    mode: "0644"
  tags: rotate-certs

- name: Generate Authentication Configuration
  ansible.builtin.template:
    src: "authentication-configuration.yaml.j2"
    dest: "/etc/kubernetes/pki/authentication-config.yaml"
    owner: root
    group: root
    mode: "0644"
  tags: rotate-certs

- name: Rotate certs
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubeadm certs renew all
  tags: rotate-certs

- name: Ensure destination directory exists
  ansible.builtin.file:
    path: /opt/kubernetes/manifests
    state: directory
    mode: '0755'
  tags: rotate-certs
  
- name: remove static pods 
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    mv  /etc/kubernetes/manifests/* /opt/kubernetes/manifests/
  tags: rotate-certs

- name: Check if containers still exist
  ansible.builtin.shell: "ctr -n k8s.io containers list  | grep -E 'kube-apiserver|etcd|kube-scheduler|kube-controller-manager' || true"
  register: list_containers
  retries: 5
  delay: 20
  until: list_containers.stdout == ""
  tags: rotate-certs


- name: recreate static pods 
  ansible.builtin.shell: |
    mv /opt/kubernetes/manifests/* /etc/kubernetes/manifests/
  tags: rotate-certs

- name: Check if containers got recreated
  ansible.builtin.shell: "ctr -n k8s.io containers list  | grep -E 'kube-apiserver|etcd|kube-scheduler|kube-controller-manager' || true"
  register: list_containers
  retries: 5
  delay: 20
  until: list_containers.stdout != ""
  tags: rotate-certs
