---
- hosts: masters
  become: true
  roles:
    - master

- hosts: 
    - workers
    - masters
  become: true
  roles:
    - worker

- name: Taint Nodes
  hosts: masters[0]
  become: true
  tasks:
    - name: Taint all nodes
      ansible.builtin.include_role:
        name: master
        tasks_from: taint-nodes.yaml
      vars:
        values: "{{ hostvars| dict2items | community.general.json_query(\"[?starts_with(key, 'master') 
          || starts_with(key, 'worker')].{host:key,extra:value.extra}\")  }}"
      tags: label_nodes

- name: Apply Calico Firewall rules for loadbalancer nodes
  hosts: masters[0]
  become: true
  tasks:
    - name: Apply Calico Firewall rules
      ansible.builtin.include_role:
        name: master
        tasks_from: apply-calico-firewall.yaml