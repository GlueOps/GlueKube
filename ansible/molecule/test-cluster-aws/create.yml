---
- name: Create AWS VMs and Security Group
  hosts: localhost
  gather_facts: true
  vars:
    num_master_nodes: 3
    num_worker_nodes: 3
    public_key: "{{ lookup('file', 'keys/vm_node.pub') }}"
    aws_region: "{{ lookup('env', 'AWS_REGION') | default('us-west-2', true) }}"
    aws_availability_zone: "{{ lookup('env', 'AWS_AVAILABILITY_ZONE') | default(aws_region ~ 'a', true) }}"
    aws_instance_type: "{{ lookup('env', 'AWS_INSTANCE_TYPE') | default('t3.large', true) }}"
    vpc_cidr: "10.1.0.0/16"
    subnet_cidr: "10.1.0.0/24"

  tasks:
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: test-molecule-vpc
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        dns_hostnames: true
        dns_support: true
        tags:
          Name: test-molecule-vpc
      register: vpc

    - name: Create Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        state: present
        tags:
          Name: test-molecule-igw
      register: igw

    - name: Create Subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ subnet_cidr }}"
        az: "{{ aws_availability_zone }}"
        region: "{{ aws_region }}"
        map_public: true
        tags:
          Name: test-molecule-subnet
      register: subnet

    - name: Create Route Table with default route to Internet Gateway
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        subnets:
          - "{{ subnet.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        tags:
          Name: test-molecule-rt
      register: route_table

    - name: Create Security Group
      amazon.aws.ec2_security_group:
        name: my-security-group
        description: Allow all TCP/UDP for kubeadm test cluster
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            from_port: 1
            to_port: 65535
            cidr_ip:
              - "0.0.0.0/0"
            rule_desc: Allow all TCP
          - proto: udp
            from_port: 1
            to_port: 65535
            cidr_ip:
              - "0.0.0.0/0"
            rule_desc: Allow all UDP
          - proto: icmp
            from_port: -1
            to_port: -1
            cidr_ip:
              - "0.0.0.0/0"
            rule_desc: Allow ICMP
        rules_egress:
          - proto: -1
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow all egress
        tags:
          Name: my-security-group
      register: security_group

    - name: Import SSH Key Pair
      amazon.aws.ec2_key:
        name: test-molecule-key
        key_material: "{{ public_key }}"
        region: "{{ aws_region }}"
      register: keypair

    - name: Look up latest Ubuntu 24.04 AMI (Canonical)
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners: "099720109477"
        filters:
          name: "ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-*"
          state: available
          architecture: x86_64
          root-device-type: ebs
          virtualization-type: hvm
      register: ami_info

    - name: Select the newest matching AMI
      ansible.builtin.set_fact:
        ubuntu_ami_id: "{{ (ami_info.images | sort(attribute='creation_date') | last).image_id }}"

    - name: Create Master Nodes
      amazon.aws.ec2_instance:
        name: "master-node-{{ item + 1 }}"
        region: "{{ aws_region }}"
        key_name: test-molecule-key
        instance_type: "{{ aws_instance_type }}"
        image_id: "{{ ubuntu_ami_id }}"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        security_group: "{{ security_group.group_id }}"
        network:
          assign_public_ip: true
        user_data: "{{ lookup('template', 'cloudinit/cloud-init.yaml.j2') }}"
        wait: true
        tags:
          Name: "master-node-{{ item + 1 }}"
          Role: master
          Cluster: test-molecule
      loop: "{{ range(0, num_master_nodes) | list }}"
      register: master_nodes

    - name: Create Worker Nodes
      amazon.aws.ec2_instance:
        name: "worker-node-{{ item + 1 }}"
        region: "{{ aws_region }}"
        key_name: test-molecule-key
        instance_type: "{{ aws_instance_type }}"
        image_id: "{{ ubuntu_ami_id }}"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        security_group: "{{ security_group.group_id }}"
        network:
          assign_public_ip: true
        user_data: "{{ lookup('template', 'cloudinit/cloud-init.yaml.j2') }}"
        wait: true
        tags:
          Name: "worker-node-{{ item + 1 }}"
          Role: worker
          Cluster: test-molecule
      loop: "{{ range(0, num_worker_nodes) | list }}"
      register: worker_nodes

    - name: Store default inventory
      ansible.builtin.copy:
        content: |
          all:
            children:
              masters:
                hosts:
                  {% for node in master_nodes.results -%}
                    {{ node.instances[0].tags.Name }}:
                      ansible_host: {{ node.instances[0].public_ip_address }}
                      ip: {{ node.instances[0].private_ip_address }}
                      ansible_user: cluster
                      ansible_ssh_private_key_file: keys/vm_node
                      extra:
                        taints:
                          - node-role.kubernetes.io/control-plane:NoSchedule-
                  {% endfor +%}
              workers:
                hosts:
                  {% for node in worker_nodes.results -%}
                    {{ node.instances[0].tags.Name }}:
                      ansible_host: {{ node.instances[0].public_ip_address }}
                      ip: {{ node.instances[0].private_ip_address }}
                      ansible_user: cluster
                      ansible_ssh_private_key_file: keys/vm_node
                      extra:
                        taints:
                          - node-role.kubernetes.io/control-plane:NoSchedule-
                  {% endfor +%}
        dest: "./inventory/hosts.yaml"
        mode: "0644"

    - name: Update DNS records with master node IPs via AutoGlue API
      ansible.builtin.uri:
        url: "{{ lookup('env', 'AUTOGLUE_BASE_URL') }}/api/v1/dns/records/{{ lookup('env', 'AUTOGLUE_RECORD_ID') }}"
        method: PATCH
        headers:
          accept: application/json
          x-org-key: "{{ lookup('env', 'AUTOGLUE_ORG_KEY') }}"
          x-org-secret: "{{ lookup('env', 'AUTOGLUE_ORG_SECRET') }}"
          content-type: application/json
          x-org-id: "{{ lookup('env', 'AUTOGLUE_ORG_ID') }}"
        body_format: json
        body:
          name: ctrp
          ttl: 60
          type: A
          values: "{{ master_nodes.results | map(attribute='instances') | map('first') | map(attribute='private_ip_address') | list }}"
        status_code: [200, 201, 204]

    - name: wait for 60 seconds to ensure that the nodes are up and running
      ansible.builtin.pause:
        seconds: 60
