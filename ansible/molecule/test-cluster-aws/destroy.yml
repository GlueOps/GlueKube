---
- name: Destroy AWS VMs and Security Group
  hosts: localhost
  gather_facts: true
  vars:
    num_master_nodes: 3
    num_worker_nodes: 3
    aws_region: "{{ lookup('env', 'AWS_REGION') | default('us-west-2', true) }}"
    vpc_cidr: "10.1.0.0/16"
    subnet_cidr: "10.1.0.0/24"

  tasks:
    - name: Look up VPC
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": test-molecule-vpc
      register: vpc_info

    - name: Set VPC ID fact
      ansible.builtin.set_fact:
        vpc_id: "{{ (vpc_info.vpcs | first).vpc_id }}"
      when: vpc_info.vpcs | length > 0

    - name: Terminate Master Nodes
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        state: absent
        filters:
          "tag:Name": "master-node-{{ item + 1 }}"
          instance-state-name:
            - pending
            - running
            - stopping
            - stopped
        wait: true
      loop: "{{ range(0, num_master_nodes) | list }}"
      register: delete_master_nodes

    - name: Terminate Worker Nodes
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        state: absent
        filters:
          "tag:Name": "worker-node-{{ item + 1 }}"
          instance-state-name:
            - pending
            - running
            - stopping
            - stopped
        wait: true
      loop: "{{ range(0, num_worker_nodes) | list }}"
      register: delete_worker_nodes

    - name: Delete SSH Key Pair
      amazon.aws.ec2_key:
        name: test-molecule-key
        region: "{{ aws_region }}"
        state: absent

    - name: Delete Security Group
      amazon.aws.ec2_security_group:
        name: my-security-group
        vpc_id: "{{ vpc_id }}"
        region: "{{ aws_region }}"
        state: absent
      when: vpc_id is defined
      register: delete_security_group

    - name: Delete Route Table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc_id }}"
        region: "{{ aws_region }}"
        tags:
          Name: test-molecule-rt
        lookup: tag
        state: absent
      when: vpc_id is defined
      register: delete_route_table

    - name: Delete Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc_id }}"
        region: "{{ aws_region }}"
        state: absent
      when: vpc_id is defined
      register: delete_igw

    - name: Delete Subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc_id }}"
        cidr: "{{ subnet_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      when: vpc_id is defined
      register: delete_subnet

    - name: Delete VPC
      amazon.aws.ec2_vpc_net:
        name: test-molecule-vpc
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      register: delete_vpc
