---
platforms: 
  - name: instance-1
driver:
  name: default

provisioner:
  name: ansible
  inventory:
    links:
      hosts: inventory/hosts.yaml
      group_vars: inventory/group_vars
  playbooks:
    side_effect: side_effect/default.yaml
    

scenario:
  name: rotate-master-nodes
  test_sequence:
    - create
    - converge
    - side_effect tests/test_cluster_healthy.yaml
    - side_effect side_effect/rotate_master_nodes.yaml
    - side_effect tests/test_cluster_healthy.yaml
    - side_effect side_effect/second_rotate_master_nodes.yaml
    - side_effect tests/test_cluster_healthy.yaml
    - destroy

verifier:
  name: ansible