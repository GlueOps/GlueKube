certificate_key: "{{ lookup('env', 'CERTIFICATE_KEY') }}"
random_token: "{{ lookup('env', 'RANDOM_TOKEN') }}"

kubeadm_config_file: "/etc/kubernetes/kubeadm-config.yaml" 
cni_type: calico 
service_subnet: "{{ lookup('env', 'network_service_cidr') }}"

# calico
calico_node_to_node_encryption: false
calico_chart_version: "{{ lookup('env', 'calico_chart_version') }}" #"v3.29.3"
calico_tigera_operator_version:  "{{ lookup('env', 'calico_tigera_operator_version') }}" #"v1.36.7"
calico_network_calico_cidr: "{{ lookup('env', 'calico_network_calico_cidr') }}"

nodes: |
  {% for host in groups['masters'] %}
  {{ hostvars[host]['ip'] }}:2379{% if not loop.last %},{% endif %}
  {% endfor %}

etcd_nodes_endpoints: "{{ nodes | trim}}"
etcd_initial_cluster: "{{ groups['masters'] | map('extract', hostvars, 'ip') | list }}"
etcd_secret_namespace: "glueops-core-kube-prometheus-stack"

kubeconfig_export_path: "./.kube/config"

autoglue_base_url: "{{ lookup('env', 'AUTOGLUE_BASE_URL') | default('https://autoglue.glueopshosted.com', true) }}"
autoglue_org_key: "{{ lookup('env', 'AUTOGLUE_ORG_KEY') }}"
autoglue_org_secret: "{{ lookup('env', 'AUTOGLUE_ORG_SECRET') }}"
autoglue_org_id: "{{ lookup('env', 'AUTOGLUE_ORG_ID') }}"
autoglue_record_id: "{{ lookup('env', 'AUTOGLUE_RECORD_ID') }}"
autoglue_cluster_id: "{{ lookup('env', 'AUTOGLUE_CLUSTER_ID') }}"